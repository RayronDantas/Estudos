<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analisador de Números</title>
  <link rel="stylesheet" href="chatgpt.css">
</head>
<body>
  <header>
    <h1>Analisador de Números</h1>
  </header>

  <main>
    <section class="card">
      <form onsubmit="event.preventDefault(); adicionar();">
        <label for="numtxt">Número (entre 1 e 100):</label>
        <input type="number" id="numtxt" name="num" min="1" max="100" required>
        <button type="submit">Adicionar</button>
      </form>

      <select id="numlist" size="10" aria-label="Lista de números adicionados"></select>

      <button id="finalizar" onclick="finalizar()">Finalizar</button>

      <div id="res"></div>
    </section>
  </main>

  <footer>
    <p>&copy; Dev: Rayron Dantas</p>
  </footer>

  <script src="chatgpt02.js"></script>
</body>
</html>
