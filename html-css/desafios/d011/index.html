<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astroboy</title>
    <style>
        body {
            margin: 0;
        }
        div.space {
            height: 100dvh;
            background-image: url("images/espaco.jpg");
            background-position: center top;
            background-size: cover;
            background-attachment: fixed;
        }
        img.astronaut {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        div.void {
            height: 100dvh;
            background-color: black;
            background-image: url("images/pattern001.png");
            color: white;
            padding: 20px;
        }
        div.void h1 {
            text-align: center;
            padding-top: 40vh;
            font-size: 80px;
        }
    </style>
</head>
<body>
    <div class="space">
        <img src="images/astronauta.png" alt="Astronauta" class="astronaut">
    </div>
    <div class="void">
        <h1>O vácuo...</h1>
    </div>
</body>
</html>
