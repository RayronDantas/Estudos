<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formantando Strings</title>
    <style>
      body {
        font: normal 20pt arial;
      }
    </style>
  </head>
  <body>
    <script>
      var nome = window.prompt("Qual seu nome?");
      var saldo = window.prompt("Digite seu saldo.");
      var novosaldo = Number(saldo)
      document.write(`Olá, ${nome}. Seu nome tem ${nome.length} letras. <br>`);
      document.write(
        `Seu saldo é: ${novosaldo.toLocaleString("pt-BR", {
          style: "currency",
          currency: "BRL",
        })}`
      );
    </script>
  </body>
</html>
