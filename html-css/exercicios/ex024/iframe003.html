<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renderização dinâmica com iframe</title>
    <style>
        iframe {
            border: 1px solid black;
            width: 400px;
            height: 300px;
        }
    </style>
</head>
<body>
    <h1>Carregando múltiplas páginas no meu iframe</h1>
    <ul>
        <li>
            <a href="paginas-extras/page001.html" target="frame">Página 1</a>
        </li>
        <li>
            <a href="paginas-extras/page002.html" target="frame">Página 2</a>
        </li>
        <li>
            <a href="paginas-extras/page003.html" target="frame">Página 3</a>
        </li>
    </ul>

    <iframe id="tela" name="frame" frameborder="0" srcdoc="<h1>Selecione uma das opções acima</h1><img src='images/curso-em-video-logo.png'/>"></iframe>
</body>
</html>
