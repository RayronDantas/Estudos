<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralizando verticalmente</title>
    <style>
        body {
            height: 96dvh;
        }
        main.container {
            position: relative;
            background-color: green;
            background-image: url("images/target001.png");
            background-size: 100% 100%;
            height: 95vh;
        }
        article.conteudo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: tomato;
            background-image: url("images/target001.png");
            background-size: 100% 100%;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <main class="container">
        <article class="conteudo">

        </article>
    </main>
</body>
</html>
