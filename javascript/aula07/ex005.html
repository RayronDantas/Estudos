<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução a DOM</title>
    <style>
        body {
            background-color: rgb(17, 135, 238);
            font: normal 18pt Arial;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos com DOM</h1>
    <p class="frst">Aprendendo a usar <strong>DOM</strong> com JavaScript</p>
    <h2>JS é brabo</h2>
    <p class="scd">testando...</p>
    <script>
        var p1 = window.document.getElementsByTagName('p')[0]
        var p2 = window.document.getElementsByTagName('p')[1]
        window.document.write(`Está escrito assim: ${p1.innerText}, ${p2.innerText}`)
        /* document.write(window.document.charset + '<br>')
        document.write(window.document.URL + '<br>')
        document.write(window.navigator.appName + '<br>') */
        var s1 = window.document.querySelector('p')
        s1.style.color = 'green'
        var s2 = window.document.querySelector('p.scd') //"querySelector puxa somente o primeiro elemento, se houvesse vários "p" com a class "scd" ele só puxa o primeiro
        s2.innerText = 'Conectando...'

    </script>
</body>
</html>
